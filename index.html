<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Storage Allocation Simulator</title>
  <meta name="description"
    content="Interactive simulator for First Fit, Best Fit, and Worst Fit memory allocation algorithms with real-time visualization and fragmentation analysis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="7" height="11" rx="2" fill="url(#g1)" />
            <rect x="11" y="2" width="7" height="7" rx="2" fill="url(#g2)" />
            <rect x="20" y="2" width="6" height="15" rx="2" fill="url(#g3)" />
            <rect x="2" y="15" width="7" height="11" rx="2" fill="url(#g4)" opacity="0.5" />
            <rect x="11" y="11" width="7" height="15" rx="2" fill="url(#g2)" />
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                <stop stop-color="#6366f1" />
                <stop offset="1" stop-color="#8b5cf6" />
              </linearGradient>
              <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
                <stop stop-color="#06b6d4" />
                <stop offset="1" stop-color="#3b82f6" />
              </linearGradient>
              <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
                <stop stop-color="#10b981" />
                <stop offset="1" stop-color="#06b6d4" />
              </linearGradient>
              <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
                <stop stop-color="#6366f1" />
                <stop offset="1" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <div class="logo-title">MemAlloc Simulator</div>
          <div class="logo-sub">Dynamic Storage Allocation</div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- INPUT PANEL -->
    <section class="input-section" id="input-section">
      <div class="section-label">
        <span class="step-num">01</span>
        <span>Configure Memory & Processes</span>
      </div>

      <div class="input-grid">
        <!-- Memory Blocks -->
        <div class="card input-card">
          <div class="card-header">
            <div class="card-icon card-icon--purple">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2" />
                <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                <line x1="12" y1="12" x2="12" y2="16" />
                <line x1="10" y1="14" x2="14" y2="14" />
              </svg>
            </div>
            <h2 class="card-title">Memory Blocks</h2>
          </div>
          <div class="form-group">
            <label class="form-label" for="num-blocks">Number of Blocks</label>
            <div class="input-row">
              <input type="number" id="num-blocks" class="form-input" min="1" max="12" value="6" placeholder="1–12" />
              <button class="btn btn-secondary" id="gen-blocks-btn" onclick="generateBlockInputs()">Generate</button>
            </div>
          </div>
          <div id="block-sizes-container" class="dynamic-inputs"></div>
        </div>

        <!-- Processes -->
        <div class="card input-card">
          <div class="card-header">
            <div class="card-icon card-icon--cyan">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4" />
                <path d="M6 20v-2a6 6 0 0 1 12 0v2" />
              </svg>
            </div>
            <h2 class="card-title">Processes</h2>
          </div>
          <div class="form-group">
            <label class="form-label" for="num-processes">Number of Processes</label>
            <div class="input-row">
              <input type="number" id="num-processes" class="form-input" min="1" max="12" value="5"
                placeholder="1–12" />
              <button class="btn btn-secondary" id="gen-proc-btn" onclick="generateProcessInputs()">Generate</button>
            </div>
          </div>
          <div id="process-sizes-container" class="dynamic-inputs"></div>
        </div>
      </div>


      <div class="simulate-row">
        <button class="btn btn-primary btn-simulate" id="simulate-btn" onclick="runSimulation()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          Run Simulation
        </button>
        <button class="btn btn-ghost" onclick="resetAll()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10" />
            <path d="M3.51 15a9 9 0 1 0 .49-3.58" />
          </svg>
          Reset
        </button>
      </div>
    </section>

    <!-- RESULTS -->
    <section class="results-section" id="results-section" style="display:none">
      <div class="section-label">
        <span class="step-num">02</span>
        <span>Simulation Results</span>
      </div>

      <!-- Summary Cards -->
      <div class="summary-cards" id="summary-cards"></div>

      <!-- Algorithm Tabs -->
      <div class="tabs-wrapper">
        <div class="tabs" id="algo-tabs">
          <button class="tab active" data-algo="first-fit" onclick="switchTab(this,'first-fit')">
            <span class="tab-dot tab-dot--ff"></span>First Fit
          </button>
          <button class="tab" data-algo="best-fit" onclick="switchTab(this,'best-fit')">
            <span class="tab-dot tab-dot--bf"></span>Best Fit
          </button>
          <button class="tab" data-algo="worst-fit" onclick="switchTab(this,'worst-fit')">
            <span class="tab-dot tab-dot--wf"></span>Worst Fit
          </button>
        </div>
      </div>

      <!-- Algorithm Panels -->
      <div id="algo-panels">
        <div class="algo-panel" id="panel-first-fit"></div>
        <div class="algo-panel" id="panel-best-fit" style="display:none"></div>
        <div class="algo-panel" id="panel-worst-fit" style="display:none"></div>
      </div>

      <!-- Comparison Table -->
      <div class="card comparison-card" id="comparison-section">
        <div class="card-header">
          <div class="card-icon card-icon--green">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10" />
              <line x1="12" y1="20" x2="12" y2="4" />
              <line x1="6" y1="20" x2="6" y2="14" />
            </svg>
          </div>
          <h2 class="card-title">Algorithm Comparison</h2>
        </div>
        <div class="table-scroll">
          <table class="comparison-table" id="comparison-table"></table>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Dynamic Storage Allocation Simulator &mdash; First Fit · Best Fit · Worst Fit</p>
  </footer>

  <script src="simulator.js"></script>
</body>

</html>
